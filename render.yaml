# Render Blueprint — FlacronControl
# Docs: https://render.com/docs/blueprint-spec
#
# Defines 2 Render services:
#   1. flacron-frontend        — React/Vite SPA (Static Site)
#   2. flacron-voice-bridge    — Twilio <-> OpenAI WebSocket bridge (Web Service)
#
# Firebase Cloud Functions (Stripe, AI chat, invoices, email, triggers)
# are deployed separately via: firebase deploy --only functions

services:

  # ── 1. Frontend (Static Site) ──────────────────────────────────────────────
  - type: web
    name: flacron-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      # SPA fallback — all routes serve index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_STORAGE_BUCKET
        sync: false
      - key: VITE_FIREBASE_MESSAGING_SENDER_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: VITE_OPENAI_API_KEY
        sync: false
      - key: VITE_WATSONX_API_KEY
        sync: false
      - key: VITE_WATSONX_URL
        sync: false
      - key: VITE_WATSONX_PROJECT_ID
        sync: false
      - key: VITE_APP_URL
        sync: false

  # ── 2. Voice Realtime Bridge (Web Service) ─────────────────────────────────
  - type: web
    name: flacron-voice-bridge
    runtime: node
    rootDir: voice-bridge
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: starter
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: PORT
        value: "8080"
    healthCheckPath: /
